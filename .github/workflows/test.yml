name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
